name: Publish Update

permissions:
  contents: read

# Re-builds the source with the operator's API_HOST baked in, and POSTs the
# per-ABI APKs to the eneverre-api auto-update endpoint (track=phone). The
# version is read from the freshly built APK.
#
# Manual only. Never auto-runs. Use it to publish a build that the operator
# just produced with "Build Signed APK & GitHub Release" (or any other build
# of the current source) to the eneverre-api server.
#
# Requires API_HOST and UPDATE_PUBLISH_TOKEN secrets. The first step fails
# fast with a clear error if either is missing.
on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Expected versionName (must match the value in app/build.gradle). The built APK is validated against this before publishing.'
        required: true
        type: string

jobs:
  publish:
    name: Publish to API server
    runs-on: ubuntu-latest

    steps:
      - name: Validate required secrets
        env:
          API_HOST: ${{ secrets.API_HOST }}
          UPDATE_TOKEN: ${{ secrets.UPDATE_PUBLISH_TOKEN }}
        run: |
          fail=0
          if [[ -z "${API_HOST}" ]]; then
            echo "::error::Secret API_HOST is not set. Configure it in the repo settings to enable auto-update publishing."
            fail=1
          fi
          if [[ -z "${UPDATE_TOKEN}" ]]; then
            echo "::error::Secret UPDATE_PUBLISH_TOKEN is not set. Configure it in the repo settings to enable auto-update publishing."
            fail=1
          fi
          exit $fail

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/keystore.jks

      - name: Build Release APK (with API_HOST)
        env:
          API_HOST: ${{ secrets.API_HOST }}
        run: |
          ./gradlew assembleRelease \
            -PAPI_HOST="${API_HOST}" \
            -PSTORE_FILE=keystore.jks \
            -PSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }} \
            -PKEY_ALIAS=${{ secrets.KEY_ALIAS }} \
            -PKEY_PASSWORD=${{ secrets.KEY_PASSWORD }} \
            --configuration-cache

      - name: Extract version info from APK
        id: version
        run: |
          set -euo pipefail
          # versionCode/versionName are build-wide, so any of the per-ABI
          # APKs is fine. Use the universal one because it is always built
          # when splits.universalApk is true.
          APK=$(ls app/build/outputs/apk/release/*universal*.apk | head -1)
          if [[ -z "$APK" ]]; then
            echo "::error::No universal APK found in app/build/outputs/apk/release/"
            exit 1
          fi
          AAPT2=$(ls -d "${ANDROID_HOME}"/build-tools/*/aapt2 2>/dev/null | sort -V | tail -1 || true)
          if [[ -z "$AAPT2" ]]; then
            echo "::error::aapt2 not found in ANDROID_HOME/build-tools"
            exit 1
          fi
          BADGING=$("$AAPT2" dump badging "$APK")
          VERSION_NAME=$(echo "$BADGING" | sed -nE "s/^package: name='[^']+' versionCode='[0-9]+' versionName='([^']+)'.*/\1/p" | head -1)
          VERSION_CODE=$(echo "$BADGING" | sed -nE "s/^package: name='[^']+' versionCode='([0-9]+)'.*/\1/p" | head -1)
          if [[ -z "$VERSION_NAME" || -z "$VERSION_CODE" ]]; then
            echo "::error::Could not extract versionName/versionCode from $APK"
            echo "Badging output:"
            echo "$BADGING" | head -10
            exit 1
          fi
          echo "versionName=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "versionCode=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION_NAME ($VERSION_CODE)"

      - name: Validate built version
        # The input is the version the operator bumped in app/build.gradle.
        # Sanity-check that the APK actually carries that version, so a
        # forgotten bump fails the publish loudly.
        env:
          EXPECTED: ${{ inputs.version_name }}
        run: |
          if [[ "${EXPECTED}" != "${{ steps.version.outputs.versionName }}" ]]; then
            echo "::error::APK versionName is '${{ steps.version.outputs.versionName }}' but the workflow input was '${EXPECTED}'. Did you forget to bump versionName in app/build.gradle?"
            exit 1
          fi
          echo "Version OK: ${{ steps.version.outputs.versionName }}"

      - name: Publish to API server
        env:
          API_HOST: ${{ secrets.API_HOST }}
          UPDATE_TOKEN: ${{ secrets.UPDATE_PUBLISH_TOKEN }}
          VERSION_NAME: ${{ steps.version.outputs.versionName }}
          VERSION_CODE: ${{ steps.version.outputs.versionCode }}
        run: |
          set -euo pipefail
          shopt -s nullglob

          # Strip any trailing slash from the host before appending the path.
          HOST="${API_HOST%/}"
          URL="${HOST}/api/admin/app/updates/phone"

          APK_DIR=app/build/outputs/apk/release
          ARM64_APK=$(ls "$APK_DIR"/*arm64*.apk 2>/dev/null | head -1 || true)
          ARMV7_APK=$(ls "$APK_DIR"/*armeabi*.apk 2>/dev/null | head -1 || true)

          if [[ -z "$ARM64_APK" || -z "$ARMV7_APK" ]]; then
            echo "::error::Missing per-ABI splits in $APK_DIR (arm64: '${ARM64_APK:-<missing>}', armeabi-v7a: '${ARMV7_APK:-<missing>}')"
            exit 1
          fi

          echo "Publishing 2 APK(s) to $URL  (versionName=$VERSION_NAME, versionCode=$VERSION_CODE)"
          echo
          # Multi-POST publish: the first POST stages arm64 with
          # finalize=false so the server keeps the in-progress release in
          # pending.json; the second POST appends armeabi-v7a and
          # commits atomically with finalize=true. This way a retry of
          # this workflow (or a re-run after a transient failure)
          # replaces the staged APK instead of "rotating" an
          # already-committed partial release.
          echo "[1/2] POST $URL  (apk_arm64-v8a=$(basename "$ARM64_APK"), finalize=false)"
          RESPONSE=$(curl --max-time 1800 -sS -w "\n__HTTP__%{http_code}" \
            -H "Authorization: Bearer ${UPDATE_TOKEN}" \
            -F "apk_arm64-v8a=@${ARM64_APK}" \
            -F "versionName=${VERSION_NAME}" \
            -F "versionCode=${VERSION_CODE}" \
            -F "finalize=false" \
            -X POST "${URL}")
          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/.*__HTTP__\([0-9]\+\).*/\1/p')
          BODY=$(echo "$RESPONSE" | sed 's/__HTTP__[0-9]\+//')
          echo "Response (HTTP $HTTP_CODE):"
          echo "$BODY"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Publish failed for arm64-v8a with HTTP $HTTP_CODE"
            exit 1
          fi

          echo
          echo "[2/2] POST $URL  (apk_armeabi-v7a=$(basename "$ARMV7_APK"), finalize=true)"
          RESPONSE=$(curl --max-time 1800 -sS -w "\n__HTTP__%{http_code}" \
            -H "Authorization: Bearer ${UPDATE_TOKEN}" \
            -F "apk_armeabi-v7a=@${ARMV7_APK}" \
            -F "versionName=${VERSION_NAME}" \
            -F "versionCode=${VERSION_CODE}" \
            -F "finalize=true" \
            -X POST "${URL}")
          HTTP_CODE=$(echo "$RESPONSE" | sed -n 's/.*__HTTP__\([0-9]\+\).*/\1/p')
          BODY=$(echo "$RESPONSE" | sed 's/__HTTP__[0-9]\+//')
          echo "Response (HTTP $HTTP_CODE):"
          echo "$BODY"
          if [[ "$HTTP_CODE" != "200" ]]; then
            echo "::error::Publish failed for armeabi-v7a with HTTP $HTTP_CODE"
            exit 1
          fi

          echo
          echo "All 2 APK(s) committed as version $VERSION_NAME ($VERSION_CODE)."
